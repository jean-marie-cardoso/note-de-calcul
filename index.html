<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soft Études - Bientôt de retour</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      max-width: 620px;
      width: 100%;
      padding: 48px 32px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.25);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .badge {
      display: inline-block;
      margin-bottom: 22px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 600;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1.7;
    }

    .footer {
      margin-top: 32px;
      font-size: 0.9rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Maintenance en cours</div>
    <h1>Bientôt de retour</h1>
    <p>
      Soft Études est actuellement en cours d'amélioration.
      Le site revient prochainement avec une nouvelle architecture plus propre,
      plus sécurisée et plus performante.
    </p>
    <div class="footer">
      Merci pour votre patience.
    </div>
  </main>
</body>
</html>
