<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Projet en préproduction</title>
  <meta name="description" content="Page de présentation et redirection vers le site en préproduction." />

  <meta http-equiv="refresh" content="3; url=http://82.67.215.219" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      text-align: center;
    }

    .card {
      max-width: 520px;
      padding: 32px;
      border-radius: 16px;
      background: #1e293b;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin-top: 0;
      font-size: 1.8rem;
    }

    p {
      color: #cbd5e1;
      line-height: 1.5;
    }

    a {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 18px;
      border-radius: 8px;
      background: #38bdf8;
      color: #020617;
      text-decoration: none;
      font-weight: bold;
    }

    .badges {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .badges a {
      margin-top: 0;
      padding: 0;
      background: transparent;
    }

    .badges img {
      height: 20px;
    }
  </style>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const badgeContainer = document.getElementById("readme-badges");
      if (!badgeContainer) {
        return;
      }

      const fallbackBadges = [
        {
          alt: "Status",
          imgUrl: "https://img.shields.io/badge/Status-Pr%C3%A9production-orange",
          linkUrl: ""
        },
        {
          alt: "Version",
          imgUrl: "https://img.shields.io/badge/Version-1.1.2-blue",
          linkUrl: ""
        },
        {
          alt: "Démo",
          imgUrl: "https://img.shields.io/badge/D%C3%A9mo-En_ligne-success",
          linkUrl: "http://82.67.215.219"
        }
      ];

      const readmeUrls = [
        "./README.md",
        "https://raw.githubusercontent.com/jean-marie-cardoso/Note-de-calcul/main/README.md"
      ];

      const extractBadges = (markdown) => {
        const badgeRegex = /\[!\[([^\]]+)\]\(([^)]+)\)\]\(([^)]*)\)/g;
        return [...markdown.matchAll(badgeRegex)].map(([, alt, imgUrl, linkUrl]) => ({
          alt,
          imgUrl,
          linkUrl
        }));
      };

      const displayBadges = (badges) => {
        badgeContainer.replaceChildren();

        badges.forEach(({ alt, imgUrl, linkUrl }) => {
          const image = document.createElement("img");
          image.src = encodeURI(imgUrl);
          image.alt = alt;

          if (linkUrl) {
            const link = document.createElement("a");
            link.href = linkUrl;
            link.appendChild(image);
            badgeContainer.appendChild(link);
            return;
          }

          badgeContainer.appendChild(image);
        });
      };

      const loadReadmeBadges = async () => {
        for (const readmeUrl of readmeUrls) {
          try {
            const response = await fetch(readmeUrl);
            if (!response.ok) {
              continue;
            }

            const badges = extractBadges(await response.text());
            if (badges.length > 0) {
              displayBadges(badges);
              return;
            }
          } catch (error) {
            continue;
          }
        }
      };

      displayBadges(fallbackBadges);
      loadReadmeBadges();
    });

    setTimeout(() => {
      window.location.href = "http://82.67.215.219";
    }, 3000);
  </script>
</head>

<body>
  <main class="card">
    <div id="readme-badges" class="badges"></div>
    <h1>Démo</h1>
    <p>
      Préproduction hébergée sur un serveur privé de test.
    </p>
    <p>
      Redirection automatique vers le site en cours...
    </p>
    <a href="http://82.67.215.219">Accéder au site</a>
  </main>
</body>
</html>
